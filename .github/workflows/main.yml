name: Generate Documentation

on:
  push:
    paths:
      - '**.ts'
      - '**.tsx'
      - 'package.json'
      - '.github/workflows/generate-docs.yml'

jobs:
  check-ts-files:
    name: Check if TypeScript files exist
    runs-on: ubuntu-latest
    outputs:
      has_ts: ${{ steps.check.outputs.has_ts }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for TypeScript files
        id: check
        run: |
          if find . -type f -name "*.ts" -o -name "*.tsx" | grep -q .; then
            echo "has_ts=true" >> $GITHUB_OUTPUT
          else
            echo "has_ts=false" >> $GITHUB_OUTPUT
          fi

  generate-docs:
    needs: check-ts-files
    if: needs.check-ts-files.outputs.has_ts == 'true'
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate documentation
        run: npm run docs

      - name: Commit and push documentation
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/ README.md
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "docs: auto-generate documentation from TypeScript"
            git push
          )
